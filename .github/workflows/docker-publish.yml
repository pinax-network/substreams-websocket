name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the SKILL.md path log lookup below resolves.
          fetch-depth: 0
      # .git is excluded from the Docker build context (.dockerignore), so
      # build.rs can't read VCS metadata for /version. Capture it here and pass
      # it in as build args.
      - name: Capture build metadata
        id: gitmeta
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --format=%cd --date=short)" >> "$GITHUB_OUTPUT"
          echo "skill_ts=$(git log -1 --format=%cI -- skills/SKILL.md)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{sha}}-{{date 'X'}},enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.gitmeta.outputs.commit }}
            GIT_COMMIT_DATE=${{ steps.gitmeta.outputs.date }}
            SKILL_MD_TIMESTAMP=${{ steps.gitmeta.outputs.skill_ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
