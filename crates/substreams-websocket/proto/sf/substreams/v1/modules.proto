syntax = "proto3";

package sf.substreams.v1;

message Modules {
  repeated Module modules = 1;
  repeated Binary binaries = 2;
}

message Binary {
  string type = 1;
  bytes content = 2;
}

message Module {
  string name = 1;

  oneof kind {
    KindMap kind_map = 2;
    KindStore kind_store = 3;
    KindBlockIndex kind_block_index = 10;
  }

  uint32 binary_index = 4;
  string binary_entrypoint = 5;
  repeated Input inputs = 6;
  Output output = 7;
  uint64 initial_block = 8;
  BlockFilter block_filter = 9;

  message BlockFilter {
    string module = 1;

    oneof query {
      string query_string = 2;
      QueryFromParams query_from_params = 3;
    }
  }

  message QueryFromParams {}

  message KindMap {
    string output_type = 1;
  }

  message KindStore {
    enum UpdatePolicy {
      UPDATE_POLICY_UNSET = 0;
      UPDATE_POLICY_SET = 1;
      UPDATE_POLICY_SET_IF_NOT_EXISTS = 2;
      UPDATE_POLICY_ADD = 3;
      UPDATE_POLICY_MIN = 4;
      UPDATE_POLICY_MAX = 5;
      UPDATE_POLICY_APPEND = 6;
      UPDATE_POLICY_SET_SUM = 7;
    }

    UpdatePolicy update_policy = 1;
    string value_type = 2;
  }

  message KindBlockIndex {
    string output_type = 1;
  }

  message FoundationalStore {
    string identifier = 1;
  }

  message Input {
    oneof input {
      Source source = 1;
      Map map = 2;
      Store store = 3;
      Params params = 4;
      FoundationalStore foundational_store = 5;
    }

    message Source {
      string type = 1;
    }

    message Map {
      string module_name = 1;
    }

    message Store {
      enum Mode {
        UNSET = 0;
        GET = 1;
        DELTAS = 2;
      }

      string module_name = 1;
      Mode mode = 2;
    }

    message Params {
      string value = 1;
    }
  }

  message Output {
    string type = 1;
  }
}
