syntax = "proto3";

package dex.swaps.v1;

enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_BOOP = 1;
  PROTOCOL_DARKLAKE = 2;
  PROTOCOL_DUMPFUN = 3;
  PROTOCOL_JUPITER_V4 = 4;
  PROTOCOL_JUPITER_V6 = 5;
  PROTOCOL_METEORA_DAAM = 6;
  PROTOCOL_METEORA_DLMM = 7;
  PROTOCOL_ORCA_WHIRLPOOL = 8;
  PROTOCOL_PUMPFUN = 9;
  PROTOCOL_PUMPFUN_AMM = 10;
  PROTOCOL_RAYDIUM_AMM_V4 = 11;
  PROTOCOL_RAYDIUM_CLMM = 12;
  PROTOCOL_RAYDIUM_CPMM = 13;
  PROTOCOL_RAYDIUM_LAUNCHPAD = 14;
  PROTOCOL_METEORA_AMM = 15;
  PROTOCOL_BYREAL = 16;
  PROTOCOL_MOONSHOT = 17;
  PROTOCOL_PANCAKESWAP = 18;
  PROTOCOL_SPL_TOKEN_SWAP = 19;
  PROTOCOL_OKX_DEX = 20;
}

message Events {
  repeated Transaction transactions = 1;
}

message Transaction {
  bytes signature = 1;
  bytes fee_payer = 2;
  repeated bytes signers = 3;
  uint64 fee = 4;
  uint64 compute_units_consumed = 5;
  repeated Swap swaps = 6;
}

message Swap {
  Protocol protocol = 1;
  bytes program_id = 2;
  uint32 stack_height = 3;
  bytes amm = 4;
  bytes amm_pool = 5;
  bytes user = 6;
  bytes input_mint = 7;
  uint64 input_amount = 8;
  bytes output_mint = 9;
  uint64 output_amount = 10;
}
