# Only [[streams]] entries belong in this file. All other server settings
# (listen address, heartbeat, max clients, production_mode, final_blocks_only,
# credentials, auth URL) are read from environment variables or CLI flags so
# that secrets stay in .env and the TOML only describes the streams to run.
#
# Each [[streams]] entry is identified by the (network, name) pair. The same
# `name` can appear multiple times as long as each entry targets a different
# network. `name` is a user-defined display string with no effect on decoding —
# WebSocket subscribers register against (network, name).
#
# Required per-stream fields:
#   name        — display label, free-form string.
#   network     — chain identifier (e.g. "solana-mainnet", "ethereum-mainnet").
#   endpoint    — Substreams gRPC endpoint URL.
#   manifest    — local path or HTTPS URL of the .spkg.
#
# Optional per-stream fields:
#   module      — Substreams output module. Default "db_out". Must emit
#                 `proto:sf.substreams.sink.database.v1.DatabaseChanges`;
#                 anything else is rejected at startup.
#   start_block — default "-1" (chain head). Negative values resolve relative
#                 to head. A persisted cursor on disk overrides this on resume.
#   stop_block  — default "0" (stream indefinitely).
#   params      — list of "module=value" Substreams parameters.

[[streams]]
name = "swaps"
network = "solana-mainnet"
endpoint = "https://solana.substreams.pinax.network:443"
manifest = "https://github.com/pinax-network/substreams-svm/releases/download/svm-dex-v0.5.1/svm-dex-v0.5.1.spkg"

[[streams]]
