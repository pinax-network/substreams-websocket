# Only [[streams]] entries belong in this file. All other server settings
# (listen address, heartbeat, max clients, production_mode, final_blocks_only,
# credentials, auth URL) are read from environment variables or CLI flags so
# that secrets stay in .env and the TOML only describes the streams to run.
#
# Stream identity is derived at startup from the loaded `.spkg`:
#   (network, package_name, package_version, module_hash)
#
# `package_name` and `package_version` come from the spkg's `Package.package_meta[0]`
# (the same fields you see with `substreams info <spkg>`). There is no
# operator-supplied `name` — WebSocket clients subscribe by `<network>@<table>`,
# where `<table>` is the DatabaseChanges table emitted by the spkg's `db_out`
# module (`swaps`, `transfers`, `spl_transfers`, etc.).
#
# Cursor + replay files are named `<network>-<package_name>@<package_version>-<module_hash>.{cursor,jsonl}`.
#
# Required per-stream fields:
#   network     — chain identifier (e.g. "solana-mainnet", "ethereum-mainnet").
#   endpoint    — Substreams gRPC endpoint URL.
#   manifest    — local path or HTTPS URL of the .spkg.
#
# Optional per-stream fields:
#   module      — Substreams output module. Default "db_out". Must emit
#                 `proto:sf.substreams.sink.database.v1.DatabaseChanges`;
#                 anything else is rejected at startup.
#   start_block — default "-1" (chain head). Negative values resolve relative
#                 to head. A persisted cursor on disk overrides this on resume.
#   stop_block  — default "0" (stream indefinitely).
#   params      — list of "module=value" Substreams parameters.
#   tables      — operator-declared list of DatabaseChanges tables this spkg
#                 emits (`swaps`, `transfers`, ...). Surfaced in the welcome
#                 message so subscribers can discover `<network>@<table>`
#                 channels without waiting for events. Optional — empty/omitted
#                 means clients discover tables at runtime from event @table
#                 fields.

[[streams]]
network = "solana-mainnet"
endpoint = "https://solana.substreams.pinax.network:443"
manifest = "https://github.com/pinax-network/substreams-svm/releases/download/svm-dex-v0.5.1/svm-dex-v0.5.1.spkg"
tables = ["swaps"]

[[streams]]
network = "solana-mainnet"
endpoint = "https://solana.substreams.pinax.network:443"
manifest = "https://github.com/pinax-network/substreams-svm/releases/download/svm-transfers-v0.3.0/svm-transfers-v0.3.0.spkg"
tables = ["spl_transfer", "system_transfer"]

[[streams]]
network = "ethereum-mainnet"
endpoint = "https://eth.substreams.pinax.network:443"
manifest = "https://github.com/pinax-network/substreams-evm/releases/download/evm-dex-v0.7.0/evm-dex-v0.7.0.spkg"
tables = ["swaps"]

[[streams]]
network = "ethereum-mainnet"
endpoint = "https://eth.substreams.pinax.network:443"
manifest = "https://github.com/pinax-network/substreams-evm/releases/download/evm-transfers-v0.4.0/evm-transfers-v0.4.0.spkg"
tables = ["erc20_transfers"]
